services:
  mongo:
    image: mongodb/mongodb-community-server:latest
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "3001:3001"
    depends_on:
      - mongo

  todo-service:
    build: ./todo-service
    container_name: todo-service
    ports:
      - "3002:3002"
    depends_on:
      - mongo
      - rabbitmq

  email-service:
    build: ./email-service
    container_name: email-service
    ports:
      - "3003:3003"
    depends_on:
      - rabbitmq

volumes:
  mongo_data:
